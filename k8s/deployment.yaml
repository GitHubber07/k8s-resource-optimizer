apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-optimization-agent
  labels:
    app: resource-optimizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-optimizer
  template:
    metadata:
      labels:
        app: resource-optimizer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: optimizer
        image: your-registry/resource-optimizer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: CPU_SAFETY_MARGIN
          value: "1.20"
        - name: MEMORY_SAFETY_MARGIN
          value: "1.25"
        - name: MAX_DOWNSIZE_RATIO
          value: "0.50"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: resource-optimization-agent-svc
spec:
  selector:
    app: resource-optimizer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
